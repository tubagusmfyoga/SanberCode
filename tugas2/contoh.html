<!doctype html>
<html>
  <head>
    <title>Contoh Class dan ID</title>
    <link href="contoh.css" rel="stylesheet" />
  </head>
  <body>
    <h1 id="judul-utama">Halo Dunia!</h1>
    <p class="teks-biru">Ini paragraf pertama.</p>
    <button class="btn">Tombol 1</button>
    <p class="teks-biru">Ini paragraf kedua.</p>
    <p id="khusus" class="teks-biru">Halo, saya paragraf!</p>
    <button class="btn">Tombol 2</button><br />
    <!-- Elemen unik dengan ID -->
    <button id="tombol-spesial">Tombol Spesial</button>
    <!-- Beberapa tombol dengan class yang sama -->
    <button class="btn">Tombol 3</button>
    <div>
      <p?>Ini paragraf di dalam div.</p>
    </div>
  </body>
</html>
