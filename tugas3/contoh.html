<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wireframe Homepage</title>
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="contoh.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="header-custom">
      <div class="logo">LOGO</div>
      <nav class="top-nav">
        <a href="#">Gift Card</a>
        <a href="#">Track Order</a>
        <a href="#">Contact Us</a>
        <input
          type="text"
          class="form-control search-bar"
          placeholder="Search..."
        />
      </nav>
    </header>

    <!-- Main Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark main-nav-custom">
      <div class="container-fluid justify-content-center">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link active" href="#">HOME</a></li>
          <li class="nav-item"><a class="nav-link" href="#">SHOP</a></li>
          <li class="nav-item"><a class="nav-link" href="#">BLOG</a></li>
          <li class="nav-item"><a class="nav-link" href="#">ABOUT US</a></li>
        </ul>
      </div>
    </nav>

    <!-- Layout Container -->
    <div class="container-fluid mt-3">
      <div class="row">
        <!-- Sidebar kiri -->
        <aside class="col-2 sidebar-left">
          <ul class="list-group">
            <li class="list-group-item">Section 1</li>
            <li class="list-group-item">Section 2</li>
            <li class="list-group-item">Section 3</li>
            <!-- ... sampai Section 15 -->
          </ul>
        </aside>

        <!-- Konten utama -->
        <main class="col-8 main-content">
          <div class="jumbotron-custom">JUMBOTRON</div>
          <div class="row g-3">
            <div class="col-md-4">
              <div class="item-custom">ITEM 1</div>
            </div>
            <div class="col-md-4">
              <div class="item-custom">ITEM 2</div>
            </div>
            <div class="col-md-4">
              <div class="item-custom">ITEM 3</div>
            </div>
          </div>
        </main>

        <!-- Sidebar kanan -->
        <aside class="col-2 sidebar-right"></aside>
      </div>
    </div>
  </body>
</html>
